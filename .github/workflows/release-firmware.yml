name: Release Firmware

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: Existing GitHub Release tag to upload assets to.
        required: false
        type: string

permissions:
  contents: write

env:
  IDF_TARGET: esp32s3
  FIRMWARE_NAME: lofi_cardputer
  IDF_CCACHE_ENABLE: "1"
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    name: Build ESP-IDF firmware
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.4

    outputs:
      artifact-name: ${{ steps.package.outputs.artifact-name }}
      package-name: ${{ steps.package.outputs.package-name }}
      release-asset-dir: ${{ steps.package.outputs.release-asset-dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-${{ env.IDF_TARGET }}-ccache-${{ hashFiles('dependencies.lock', 'sdkconfig.defaults', 'sdkconfig.release.defaults', 'CMakeLists.txt', 'main/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.IDF_TARGET }}-ccache-

      - name: Build firmware
        shell: bash
        run: |
          if [ -n "${IDF_PATH:-}" ] && [ -f "$IDF_PATH/export.sh" ]; then
            source "$IDF_PATH/export.sh"
          fi

          ccache --zero-stats || true
          idf.py set-target "$IDF_TARGET"
          idf.py build
          ccache --show-stats || true

      - name: Package firmware
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs['release-tag'] || github.ref_name }}
        run: |
          set -euo pipefail

          if [ -n "${IDF_PATH:-}" ] && [ -f "$IDF_PATH/export.sh" ]; then
            source "$IDF_PATH/export.sh"
          fi

          package_version="${RELEASE_TAG//\//-}"

          python scripts/package_webflash.py \
            --build-dir build \
            --dist-dir dist \
            --firmware-name "$FIRMWARE_NAME" \
            --release-tag "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --asset-base-url "." \
            --merge-mode esptool

          package_name="${FIRMWARE_NAME}-${package_version}.zip"

          echo "artifact-name=${FIRMWARE_NAME}-firmware" >> "$GITHUB_OUTPUT"
          echo "package-name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "release-asset-dir=dist/release-assets" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact-name }}
          path: ${{ steps.package.outputs.release-asset-dir }}/*
          if-no-files-found: error

  upload-release-asset:
    name: Upload firmware to GitHub Release
    needs: build
    if: github.event_name == 'release' || github.event.inputs['release-tag'] != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download firmware package
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/release-assets

      - name: Attach package to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs['release-tag'] }}
        run: |
          gh release upload "$RELEASE_TAG" dist/release-assets/* --clobber --repo "$GITHUB_REPOSITORY"

      - name: Publish WebFlash assets to Pages source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs['release-tag'] }}
        run: |
          set -euo pipefail

          release_path="${RELEASE_TAG//\//-}"
          target="docs/webflash/releases/${release_path}"
          mkdir -p "$target"
          cp dist/release-assets/webflash-manifest.json "$target/"
          cp dist/release-assets/lofi_cardputer-webflash.bin "$target/"
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > "$RUNNER_TEMP/webflash-release.json"

          RELEASE_JSON="$RUNNER_TEMP/webflash-release.json" \
          PACKAGE_NAME="${{ needs.build.outputs.package-name }}" \
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import quote

          release = json.loads(Path(os.environ["RELEASE_JSON"]).read_text(encoding="utf-8"))
          package_name = os.environ["PACKAGE_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          tag = release["tag_name"]
          release_path = tag.replace("/", "-")
          index_path = Path("docs/webflash/releases/index.json")

          releases = []
          if index_path.exists():
              payload = json.loads(index_path.read_text(encoding="utf-8"))
              releases = payload.get("releases", [])

          zip_url = ""
          for asset in release.get("assets", []):
              if asset.get("name") == package_name:
                  zip_url = asset.get("browser_download_url", "")
                  break
          if not zip_url:
              zip_url = (
                  f"https://github.com/{repo}/releases/download/"
                  f"{quote(tag, safe='')}/{quote(package_name, safe='')}"
              )

          entry = {
              "tag": tag,
              "prerelease": bool(release.get("prerelease")),
              "publishedAt": release.get("published_at") or "",
              "htmlUrl": release.get("html_url") or f"https://github.com/{repo}/releases/tag/{quote(tag, safe='')}",
              "commit": release.get("target_commitish") or "",
              "manifestUrl": f"releases/{release_path}/webflash-manifest.json",
              "zipUrl": zip_url,
          }

          releases = [item for item in releases if item.get("tag") != tag]
          releases.append(entry)
          releases.sort(key=lambda item: item.get("publishedAt") or "", reverse=True)
          index_path.write_text(
              json.dumps({"releases": releases}, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$target/webflash-manifest.json" "$target/lofi_cardputer-webflash.bin" docs/webflash/releases/index.json

          if git diff --cached --quiet; then
            echo "WebFlash Pages assets are already up to date."
          else
            git commit -m "Add WebFlash assets for ${RELEASE_TAG}"
            git push origin HEAD:main
          fi
